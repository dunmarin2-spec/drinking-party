<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪖 독사 조교의 원샷 룰렛</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --army-green: #4b5320; --point-red: #d63031; --bg-white: #ffffff; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: var(--bg-white); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }

        .app-card { width: 90%; max-width: 400px; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); text-align: center; border: 3px solid var(--army-green); }
        
        .badge { background: var(--army-green); color: white; padding: 5px 15px; border-radius: 50px; font-weight: 800; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
        
        h1 { font-size: 1.8rem; font-weight: 900; color: var(--army-green); margin: 10px 0; }
        .subtitle { color: #636e72; font-size: 0.9rem; margin-bottom: 30px; }

        /* 룰렛 스타일 */
        .roulette-container { position: relative; width: 280px; height: 280px; margin: 0 auto 30px; border: 8px solid var(--army-green); border-radius: 50%; overflow: hidden; transition: 4s cubic-bezier(0.2, 0, 0, 1); }
        .roulette-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--point-red); z-index: 10; }
        
        #canvas { width: 100%; height: 100%; transform: rotate(0deg); transition: 4s cubic-bezier(0.1, 0, 0, 1); }

        /* 결과 창 */
        #result-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; background: var(--point-red); color: white; padding: 30px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); z-index: 20; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .result-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; }
        .result-msg { font-size: 1.1rem; font-weight: 600; line-height: 1.5; }

        button { width: 100%; background: var(--army-green); color: white; border: none; padding: 20px; border-radius: 15px; font-size: 1.2rem; font-weight: 900; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 20px rgba(75, 83, 32, 0.3); }
        button:hover { background: #353b16; transform: translateY(-3px); }
        button:active { transform: scale(0.98); }

        @keyframes pop { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="badge">제1포병 술자리 대대</div>
        <h1>조교의 <span>원샷 룰렛</span></h1>
        <p class="subtitle">"목소리가 작다! 걸리면 원샷 실시!"</p>

        <div class="roulette-container">
            <div class="roulette-pointer"></div>
            <canvas id="canvas" width="300" height="300"></canvas>
        </div>

        <button onclick="spin()">룰렛 돌리기 (실시!)</button>
    </div>

    <div id="result-popup" onclick="this.style.display='none'">
        <div class="result-title">📢 조교의 명령!</div>
        <div id="result-msg" class="result-msg"></div>
        <p style="margin-top:20px; font-size:0.8rem; opacity:0.8;">(화면을 터치하면 닫힙니다)</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const options = ["원샷 실시!", "좌우 옆사람 건배", "안주 압수", "나만 살기", "다같이 원샷", "조교의 애교", "00초간 댄스", "옆사람 먹여주기"];
        const colors = ["#4b5320", "#5c6628", "#6d7a2f", "#4b5320", "#5c6628", "#6d7a2f", "#4b5320", "#5c6628"];

        // 룰렛 그리기
        function drawRoulette() {
            const arc = (Math.PI * 2) / options.length;
            for (let i = 0; i < options.length; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 150, arc * i, arc * (i + 1));
                ctx.fill();
                ctx.save();
                
                // 텍스트 그리기
                ctx.translate(150, 150);
                ctx.rotate(arc * i + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 14px Pretendard";
                ctx.fillText(options[i], 130, 10);
                ctx.restore();
            }
        }

        let isSpinning = false;
        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            const randomRotate = Math.floor(Math.random() * 3600) + 3600; // 최소 10바퀴 이상
            canvas.style.transform = `rotate(${randomRotate}deg)`;

            setTimeout(() => {
                isSpinning = false;
                const actualRotate = randomRotate % 360;
                const index = Math.floor((360 - actualRotate) / (360 / options.length)) % options.length;
                
                showResult(options[index]);
            }, 4100);
        }

        function showResult(msg) {
            const popup = document.getElementById('result-popup');
            const msgBox = document.getElementById('result-msg');
            
            // 조교 말투 가미
            const armyQuotes = [
                `"${msg}" 목소리가 작다! 똑바로 마신다! 실시!`,
                `"${msg}" 정신 안 차립니까? 한 방에 끝냅니다!`,
                `"${msg}" 오늘 밤 잠은 다 잤다! 지금 바로 실시!`,
                `"${msg}" 보이지 않습니까? 동기 사랑 나라 사랑이다!`,
            ];
            
            msgBox.innerText = armyQuotes[Math.floor(Math.random() * armyQuotes.length)];
            popup.style.display = 'block';
            
            // 캔버스 초기화 (다음 판을 위해)
            canvas.style.transition = 'none';
            canvas.style.transform = `rotate(${randomRotate % 360}deg)`;
        }

        drawRoulette();
    </script>
</body>
</html>
